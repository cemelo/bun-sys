name: Build pre-built libraries

on:
  workflow_dispatch:
    inputs:
      bun_tag:
        description: "Bun version tag (e.g. 1.3.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      BUN_TAG: "bun-v${{ inputs.bun_tag }}"
      BUN_VERSION: "${{ inputs.bun_tag }}"
    steps:
      - uses: actions/checkout@v4

      - name: Build in Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BUN_TAG="$BUN_TAG" \
            -e BUN_VERSION="$BUN_VERSION" \
            -e BUN_BUILD_JOBS="$(nproc)" \
            ubuntu:24.04 bash -c '
              set -euo pipefail
              apt-get update && apt-get install -y \
                git cmake ninja-build curl unzip pkg-config \
                libstdc++-14-dev zstd wget software-properties-common gnupg
              wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
              echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" \
                > /etc/apt/sources.list.d/llvm-19.list
              apt-get update && apt-get install -y clang-19 lld-19
              export CC=clang-19 CXX=clang++-19
              ln -sf /usr/bin/ld.lld-19 /usr/bin/ld.lld
              curl -fsSL https://bun.sh/install | bash
              export PATH="$HOME/.bun/bin:$PATH"

              curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source "$HOME/.cargo/env"
              cargo build --features build-from-source

              LIB_DIR=$(find target -path "*/bun-sys-*/out/lib" -type d | head -1)
              ./build/package-archives.sh "$LIB_DIR" x86_64-unknown-linux-gnu "$BUN_VERSION"
            '
        env:
          BUN_VERSION: "${{ inputs.bun_tag }}"

      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-x86_64
          path: dist/*.tar.zst

  linux-aarch64:
    runs-on: ubuntu-latest
    env:
      BUN_TAG: "bun-v${{ inputs.bun_tag }}"
      BUN_VERSION: "${{ inputs.bun_tag }}"
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build in Docker (aarch64)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BUN_TAG="$BUN_TAG" \
            -e BUN_VERSION="$BUN_VERSION" \
            -e BUN_BUILD_JOBS="$(nproc)" \
            ubuntu:24.04 bash -c '
              set -euo pipefail
              apt-get update && apt-get install -y \
                git cmake ninja-build curl unzip pkg-config \
                libstdc++-14-dev zstd wget software-properties-common gnupg
              wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
              echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" \
                > /etc/apt/sources.list.d/llvm-19.list
              apt-get update && apt-get install -y clang-19 lld-19
              export CC=clang-19 CXX=clang++-19
              ln -sf /usr/bin/ld.lld-19 /usr/bin/ld.lld
              curl -fsSL https://bun.sh/install | bash
              export PATH="$HOME/.bun/bin:$PATH"

              curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source "$HOME/.cargo/env"
              cargo build --features build-from-source

              LIB_DIR=$(find target -path "*/bun-sys-*/out/lib" -type d | head -1)
              ./build/package-archives.sh "$LIB_DIR" aarch64-unknown-linux-gnu "$BUN_VERSION"
            '
        env:
          BUN_VERSION: "${{ inputs.bun_tag }}"

      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-aarch64
          path: dist/*.tar.zst

  darwin-aarch64:
    runs-on: macos-15
    env:
      BUN_TAG: "bun-v${{ inputs.bun_tag }}"
      BUN_VERSION: "${{ inputs.bun_tag }}"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja zstd

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Build from source
        run: |
          source "$HOME/.cargo/env"
          export PATH="$HOME/.bun/bin:$PATH"
          cargo build --features build-from-source

      - name: Package archive
        run: |
          LIB_DIR=$(find target -path "*/bun-sys-*/out/lib" -type d | head -1)
          ./build/package-archives.sh "$LIB_DIR" aarch64-apple-darwin "$BUN_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: libs-darwin-aarch64
          path: dist/*.tar.zst

  create-release:
    needs: [linux-x86_64, linux-aarch64, darwin-aarch64]
    runs-on: ubuntu-latest
    env:
      BUN_VERSION: "${{ inputs.bun_tag }}"
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum *.tar.zst | tee checksums-sha256.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "libs-v${{ inputs.bun_tag }}"
          name: "Pre-built libs v${{ inputs.bun_tag }}"
          body: |
            Pre-built static libraries for bun-sys v${{ inputs.bun_tag }}.

            Update the `PREBUILT_CHECKSUMS` in `build.rs` with the values from `checksums-sha256.txt`.
          files: |
            artifacts/*.tar.zst
            artifacts/checksums-sha256.txt
