name: Build pre-built libraries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "BUN_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUN_TAG=bun-v$VERSION" >> "$GITHUB_ENV"

      - name: Install LLVM 19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-19.list
          sudo apt-get update && sudo apt-get install -y clang-19 lld-19
          sudo ln -sf /usr/bin/ld.lld-19 /usr/bin/ld.lld

      - name: Install system dependencies
        run: sudo apt-get install -y cmake ninja-build pkg-config zstd

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Build from source
        run: |
          source "$HOME/.cargo/env"
          export PATH="$HOME/.bun/bin:$PATH"
          export CC=clang-19 CXX=clang++-19
          cargo build --features build-from-source

      - name: Package archive
        run: |
          LIB_DIR=$(find target -path "*/bun-sys-*/out/lib" -type d | head -1)
          ./build/package-archives.sh "$LIB_DIR" x86_64-unknown-linux-gnu "$BUN_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-x86_64
          path: dist/*.tar.zst

  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "BUN_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUN_TAG=bun-v$VERSION" >> "$GITHUB_ENV"

      - name: Install LLVM 19
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-19.list
          sudo apt-get update && sudo apt-get install -y clang-19 lld-19
          sudo ln -sf /usr/bin/ld.lld-19 /usr/bin/ld.lld

      - name: Install system dependencies
        run: sudo apt-get install -y cmake ninja-build pkg-config zstd

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Build from source
        run: |
          source "$HOME/.cargo/env"
          export PATH="$HOME/.bun/bin:$PATH"
          export CC=clang-19 CXX=clang++-19
          cargo build --features build-from-source

      - name: Package archive
        run: |
          LIB_DIR=$(find target -path "*/bun-sys-*/out/lib" -type d | head -1)
          ./build/package-archives.sh "$LIB_DIR" aarch64-unknown-linux-gnu "$BUN_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: libs-linux-aarch64
          path: dist/*.tar.zst

  darwin-aarch64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "BUN_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUN_TAG=bun-v$VERSION" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: brew install cmake ninja zstd

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Build from source
        run: |
          source "$HOME/.cargo/env"
          export PATH="$HOME/.bun/bin:$PATH"
          cargo build --features build-from-source

      - name: Package archive
        run: |
          LIB_DIR=$(find target -path "*/bun-sys-*/out/lib" -type d | head -1)
          ./build/package-archives.sh "$LIB_DIR" aarch64-apple-darwin "$BUN_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: libs-darwin-aarch64
          path: dist/*.tar.zst

  create-release:
    needs: [linux-x86_64, linux-aarch64, darwin-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum *.tar.zst | tee checksums-sha256.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_name }}"
          name: "bun-sys ${{ github.ref_name }}"
          body: |
            Pre-built static libraries for bun-sys ${{ github.ref_name }}.

            Update the `PREBUILT_CHECKSUMS` in `build.rs` with the values from `checksums-sha256.txt`.
          files: |
            artifacts/*.tar.zst
            artifacts/checksums-sha256.txt
